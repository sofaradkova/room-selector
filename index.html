<body>
  <div id="header">
    <h1>Pick your room for the next semester!</h1>
    <div id="header-info">
      <span><i class="fas fa-calendar"></i> Semester: Spring 2025</span>
      <span><i class="fas fa-home"></i> Quad: Hollows</span>
      <span id="user-info"><i class="fas fa-user"></i> Selection time: 7:00-7:05PM</span>
    </div>
  </div>

  <div id="main-container">
    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Available Rooms</h2>
        <p id="room-count">Loading...</p>
      </div>

      <div id="controls">
        <button id="clearBtn">Clear</button>
        <label>
          <input type="checkbox" id="singleMode" checked> Single Select
        </label>
      </div>
      <div id="labelList">Loading rooms…</div>
    </div>

    <div id="canvas-wrapper">
      <canvas id="floorCanvas"></canvas>
    </div>
  </div>

  <script>
    (async function(){
      const manifestUrl = '/data/output/labels.json';
      const masksBase = '/data/output/';
      const imagesRawBase = '/data/raw/';
    
      // College housing color scheme
      const COLOR_TAKEN = [239, 68, 68];      // red
      const COLOR_AVAILABLE = [16, 185, 129];  // green
      const DEFAULT_ALPHA = 0.45;
    
      // Simulate different room statuses
      function getRoomStatus(text) {
        const hash = Array.from(text || '').reduce((h, c) => h ^ c.charCodeAt(0), 0);
        const random = hash % 2;
        if (random === 0) return 'available';
        return 'taken';
      }
    
      function ensureArrayOf3(c) {
        if (!c) return null;
        if (Array.isArray(c) && c.length >= 3) return [c[0], c[1], c[2]];
        return null;
      }
    
      function joinUrl(base, name) {
        if (!name) return null;
        if (name.startsWith('http://') || name.startsWith('https://') || name.startsWith('/')) return name;
        if (!base.endsWith('/')) base = base + '/';
        return base + name.replace(/^\/+/,'');
      }
    
      let manifest;
      try {
        const r = await fetch(manifestUrl);
        if (!r.ok) throw new Error(`Failed to load manifest: ${r.status} ${r.statusText}`);
        manifest = await r.json();
      } catch (err) {
        console.error('Error loading labels manifest:', err);
        document.getElementById('labelList').textContent = 'Failed to load labels.json — see console.';
        return;
      }
    
      let baseImageCandidate = manifest.base_image || 'floorplan6.png';
      let baseImageUrl;
      if (baseImageCandidate.startsWith('http') || baseImageCandidate.includes('/')) {
        baseImageUrl = baseImageCandidate;
      } else {
        baseImageUrl = joinUrl(imagesRawBase, baseImageCandidate);
      }
    
      const labels = manifest.labels || [];
    
      const labelList = document.getElementById('labelList');
      const canvas = document.getElementById('floorCanvas');
      const ctx = canvas.getContext('2d');
      const clearBtn = document.getElementById('clearBtn');
      const singleModeCheckbox = document.getElementById('singleMode');
      const roomCountEl = document.getElementById('room-count');
    
      const baseImg = new Image();
      baseImg.crossOrigin = 'anonymous';
      baseImg.src = baseImageUrl;
      await new Promise((res) => {
        baseImg.onload = () => {
          console.info('Base image loaded:', baseImageUrl);
          res();
        };
        baseImg.onerror = (e) => {
          console.error('Failed to load base image:', baseImageUrl, e);
          labelList.textContent = `Failed to load base image: ${baseImageUrl}`;
          res();
        };
      });
    
      const naturalW = baseImg.naturalWidth || 2000;
      const naturalH = baseImg.naturalHeight || 1200;
      canvas.width = naturalW;
      canvas.height = naturalH;
    
      function drawBase(){
        ctx.clearRect(0,0,canvas.width, canvas.height);
        if (!baseImg.complete || baseImg.naturalWidth === 0) {
          ctx.fillStyle = '#f0f0f0';
          ctx.fillRect(0,0,canvas.width, canvas.height);
          ctx.fillStyle = '#333';
          ctx.font = '20px sans-serif';
          ctx.fillText('Floor plan failed to load', 20, 40);
          return;
        }
        ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
      }
    
      drawBase();
    
      async function loadImageWithLogging(src) {
        return new Promise((res) => {
          if (!src) { res(null); return; }
          const im = new Image();
          im.crossOrigin = 'anonymous';
          im.onload = () => { res(im); };
          im.onerror = (e) => {
            console.warn('Failed to load image:', src, e);
            res(null);
          };
          im.src = src;
        });
      }
    
      async function preloadAndColorizeMasks() {
        const tmp = document.createElement('canvas');
        tmp.width = canvas.width; tmp.height = canvas.height;
        const tmpCtx = tmp.getContext('2d');
    
        for (let i = 0; i < labels.length; i++) {
          const L = labels[i];
          L._status = getRoomStatus(L.text);
          
          if (L._status === 'taken') L._color = COLOR_TAKEN;
          else L._color = COLOR_AVAILABLE;
    
          if (L.mask_file) {
            L._maskUrl = (L.mask_file.startsWith('http') || L.mask_file.startsWith('/')) ? L.mask_file : joinUrl(masksBase, L.mask_file);
          } else {
            L._maskUrl = null;
          }
    
          if (!L._maskUrl) { L._coloredCanvas = null; continue; }
    
          const mImg = await loadImageWithLogging(L._maskUrl);
          if (!mImg) { L._coloredCanvas = null; continue; }
    
          tmpCtx.clearRect(0,0,tmp.width,tmp.height);
          tmpCtx.drawImage(mImg, 0, 0, tmp.width, tmp.height);
          const md = tmpCtx.getImageData(0,0,tmp.width,tmp.height);
          const data = md.data;
    
          const colored = document.createElement('canvas');
          colored.width = tmp.width; colored.height = tmp.height;
          const cctx = colored.getContext('2d');
          const out = cctx.createImageData(tmp.width, tmp.height);
          const outd = out.data;
    
          for (let p=0;p<data.length;p+=4) {
            const maskVal = data[p];
            if (maskVal > 10) {
              outd[p]   = L._color[0];
              outd[p+1] = L._color[1];
              outd[p+2] = L._color[2];
              outd[p+3] = Math.round(255 * DEFAULT_ALPHA * (maskVal/255));
            } else {
              outd[p+3] = 0;
            }
          }
          cctx.putImageData(out, 0, 0);
          L._coloredCanvas = colored;
        }
      }
    
      await preloadAndColorizeMasks();
      drawBase();
    
      // Update room count
      const availableCount = labels.filter(l => l._status === 'available').length;
      roomCountEl.textContent = `${availableCount} Available • ${labels.length} Total`;
    
      const activeSet = new Set();
    
      function makeLabelElement(lbl, idx) {
        const div = document.createElement('div');
        div.className = 'label-item';
        div.dataset.idx = idx;
    
        const info = document.createElement('div');
        info.className = 'room-info';
    
        const name = document.createElement('div');
        name.className = 'room-name';
        name.textContent = String(lbl.text || `Room ${idx}`);
    
        const details = document.createElement('div');
        details.className = 'room-details';
        details.textContent = lbl._status === 'available' ? 'Single Occupancy' : 'Occupied';
    
        info.appendChild(name);
        info.appendChild(details);
    
        const badge = document.createElement('div');
        badge.className = 'badge ' + lbl._status;
        badge.textContent = lbl._status === 'available' ? 'Available' : 'Taken';
    
        div.appendChild(info);
        div.appendChild(badge);
    
        // Disable click for unavailable rooms
        if (lbl._status !== 'available') {
          div.style.opacity = '0.6';
          div.style.cursor = 'not-allowed';
          div.addEventListener('click', (e) => {
            e.preventDefault();
            alert(`This room is ${lbl._status}. You cannot select it.`);
          });
        } else {
          div.addEventListener('click', () => {
            const id = Number(div.dataset.idx);
            if (singleModeCheckbox.checked) {
              if (activeSet.has(id)) activeSet.delete(id);
              else { activeSet.clear(); activeSet.add(id); }
            } else {
              if (activeSet.has(id)) activeSet.delete(id);
              else activeSet.add(id);
            }
        
            document.querySelectorAll('.label-item').forEach(el => {
              el.classList.toggle('active', activeSet.has(Number(el.dataset.idx)));
            });
        
            drawBase();
            for (const id of Array.from(activeSet).sort((a,b)=>a-b)){
              const L = labels[id];
              if (!L || !L._coloredCanvas) continue;
              ctx.drawImage(L._coloredCanvas, 0, 0);
            }
          });
        }
    
        return div;
      }
    
      labelList.innerHTML = '';
      labels.forEach((lbl,i) => {
        const el = makeLabelElement(lbl,i);
        labelList.appendChild(el);
      });
    
      if (clearBtn) clearBtn.addEventListener('click', () => {
        activeSet.clear();
        drawBase();
        document.querySelectorAll('.label-item').forEach(el => el.classList.remove('active'));
      });
    
      console.info('Housing room selector initialized');
    
    })();
    </script>    
</body>
</html>
