<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Choose Your Room</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    /* Layout: sidebar + content. Allow scrolling in right panel */
    body {
      font-family: Arial, sans-serif;
      margin: 12px;
      display: flex;
      gap: 16px;
      height: calc(100vh - 24px);
      box-sizing: border-box;
    }

    #sidebar {
      width: 260px;
      max-height: 100%;
      overflow: auto;
      border-right: 1px solid #ddd;
      padding-right: 12px;
      box-sizing: border-box;
    }

    /* Right panel is scrollable if content larger than viewport */
    #canvas-wrapper {
      flex: 1 1 auto;
      max-height: 100%;
      overflow: auto;            /* <--- this allows vertical scroll when image is tall */
      background: #f8f8f8;
      display: flex;
      align-items: flex-start;   /* top-align the canvas */
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }

    /* We set the canvas to display at 100% width of wrapper's available width
       while its internal resolution remains image natural size (pixel-perfect) */
    #floorCanvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 1600px; /* optional cap */
      border: 1px solid #aaa;
      background: #fff;
    }

    .label-item {
      padding: 8px;
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .label-item:hover { background: #f7f7f7; }
    .label-item.active { background: #eef6ff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03); }

    .room-name { font-weight: 600; }
    .badge {
      padding: 4px 8px;
      border-radius: 14px;
      font-size: 0.85em;
      color: white;
    }
    .taken { background: #dc3545; }        /* red */
    .available { background: #28a745; }    /* green */

    #controls { margin-bottom: 12px; }
    #legend { margin-top: 12px; font-size: 0.9em; color: #555; }
    #legend .legend-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    #legend .swatch { width:20px; height:14px; border-radius:3px; display:inline-block; border:1px solid rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="controls">
      <button id="clearBtn">Clear</button>
      <label style="display:inline-block;margin-left:10px;">
        <input type="checkbox" id="singleMode" checked> single-select
      </label>
    </div>

    <div id="labelList">Loading labels…</div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="floorCanvas"></canvas>
  </div>

  <script>
    (async function(){
      // CONFIG: manifest & folders (trailing slashes help safe concatenation)
      const manifestUrl = './data/output/labels.json';
      const masksBase = './data/output/';   // must end with '/'
      const imagesRawBase = './data/raw/';  // where base image lives if manifest.base_image is just a filename
    
      const COLOR_TAKEN = [220, 20, 60];
      const COLOR_AVAILABLE = [50, 205, 50];
      const DEFAULT_ALPHA = 0.45;
    
      function ensureArrayOf3(c) {
        if (!c) return null;
        if (Array.isArray(c) && c.length >= 3) return [c[0], c[1], c[2]];
        return null;
      }
    
      function hashStringToBool(s) {
        let h = 2166136261 >>> 0;
        for (let i=0;i<s.length;i++){
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 16777619) >>> 0;
        }
        return (h & 1) === 1;
      }
    
      // helper: simple safe join that avoids double slashes
      function joinUrl(base, name) {
        if (!name) return null;
        if (name.startsWith('http://') || name.startsWith('https://') || name.startsWith('/')) return name;
        // ensure base ends with single '/'
        if (!base.endsWith('/')) base = base + '/';
        return base + name.replace(/^\/+/,'');
      }
    
      // load manifest (with error handling)
      let manifest;
      try {
        const r = await fetch(manifestUrl);
        if (!r.ok) throw new Error(`Failed to load manifest: ${r.status} ${r.statusText}`);
        manifest = await r.json();
      } catch (err) {
        console.error('Error loading labels manifest:', err);
        document.getElementById('labelList').textContent = 'Failed to load labels.json — see console.';
        return;
      }
    
      // Resolve base image: if manifest.base_image is a path use it; otherwise try data/raw/
      let baseImageCandidate = manifest.base_image || 'floorplan6.png';
      let baseImageUrl;
      if (baseImageCandidate.startsWith('http') || baseImageCandidate.includes('/')) {
        baseImageUrl = baseImageCandidate;
      } else {
        // try data/raw/filename
        baseImageUrl = joinUrl(imagesRawBase, baseImageCandidate);
      }
    
      const labels = manifest.labels || [];
    
      // show legend swatches if present
      if (document.getElementById('swatch-taken')) {
        document.getElementById('swatch-taken').style.background = `rgb(${COLOR_TAKEN.join(',')})`;
        document.getElementById('swatch-available').style.background = `rgb(${COLOR_AVAILABLE.join(',')})`;
      }
    
      // DOM refs
      const labelList = document.getElementById('labelList');
      const canvas = document.getElementById('floorCanvas');
      const ctx = canvas.getContext('2d');
      const clearBtn = document.getElementById('clearBtn');
      const singleModeCheckbox = document.getElementById('singleMode');
    
      // load base image with clear console message if 404
      const baseImg = new Image();
      baseImg.crossOrigin = 'anonymous';
      baseImg.src = baseImageUrl;
      await new Promise((res, rej) => {
        baseImg.onload = () => {
          console.info('Base image loaded:', baseImageUrl);
          res();
        };
        baseImg.onerror = (e) => {
          console.error('Failed to load base image:', baseImageUrl, e);
          // still resolve so UI doesn't hang — but show error
          labelList.textContent = `Failed to load base image: ${baseImageUrl} — check path in console`;
          res();
        };
      });
    
      // If baseImg didn't load (naturalWidth might be 0), guard:
      const naturalW = baseImg.naturalWidth || 2000;
      const naturalH = baseImg.naturalHeight || 1200;
      canvas.width = naturalW;
      canvas.height = naturalH;
    
      function drawBase(){
        ctx.clearRect(0,0,canvas.width, canvas.height);
        // if image failed to load, draw placeholder background + message
        if (!baseImg.complete || baseImg.naturalWidth === 0) {
          ctx.fillStyle = '#f0f0f0';
          ctx.fillRect(0,0,canvas.width, canvas.height);
          ctx.fillStyle = '#333';
          ctx.font = '20px sans-serif';
          ctx.fillText('Base image failed to load — see console (F12)', 20, 40);
          return;
        }
        ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
      }
    
      drawBase();
    
      // helper to load images with error console (masks)
      async function loadImageWithLogging(src) {
        return new Promise((res) => {
          if (!src) { res(null); return; }
          const im = new Image();
          im.crossOrigin = 'anonymous';
          im.onload = () => { res(im); };
          im.onerror = (e) => {
            console.warn('Failed to load image:', src, e);
            res(null);
          };
          im.src = src;
        });
      }
    
      // preload and colorize masks (resolving mask paths relative to masksBase)
      async function preloadAndColorizeMasks() {
        const tmp = document.createElement('canvas');
        tmp.width = canvas.width; tmp.height = canvas.height;
        const tmpCtx = tmp.getContext('2d');
    
        for (let i = 0; i < labels.length; i++) {
          const L = labels[i];
          L._occupied = (typeof L.occupied === 'boolean') ? L.occupied : hashStringToBool(String(L.text || L.index || ''));
          L._color = ensureArrayOf3(L.color) || (L._occupied ? COLOR_TAKEN : COLOR_AVAILABLE);
    
          // resolve mask url robustly:
          // if mask_file already contains a path or http, use it. otherwise join with masksBase
          if (L.mask_file) {
            L._maskUrl = (L.mask_file.startsWith('http') || L.mask_file.startsWith('/')) ? L.mask_file : joinUrl(masksBase, L.mask_file);
          } else {
            L._maskUrl = null;
          }
    
          if (!L._maskUrl) { L._coloredCanvas = null; continue; }
    
          const mImg = await loadImageWithLogging(L._maskUrl);
          if (!mImg) { L._coloredCanvas = null; continue; }
    
          tmpCtx.clearRect(0,0,tmp.width,tmp.height);
          tmpCtx.drawImage(mImg, 0, 0, tmp.width, tmp.height);
          const md = tmpCtx.getImageData(0,0,tmp.width,tmp.height);
          const data = md.data;
    
          const colored = document.createElement('canvas');
          colored.width = tmp.width; colored.height = tmp.height;
          const cctx = colored.getContext('2d');
          const out = cctx.createImageData(tmp.width, tmp.height);
          const outd = out.data;
    
          for (let p=0;p<data.length;p+=4) {
            const maskVal = data[p];
            if (maskVal > 10) {
              outd[p]   = L._color[0];
              outd[p+1] = L._color[1];
              outd[p+2] = L._color[2];
              outd[p+3] = Math.round(255 * DEFAULT_ALPHA * (maskVal/255));
            } else {
              outd[p+3] = 0;
            }
          }
          cctx.putImageData(out, 0, 0);
          L._coloredCanvas = colored;
        }
      }
    
      await preloadAndColorizeMasks();
      drawBase();
    
      const activeSet = new Set();
    
      function makeLabelElement(lbl, idx) {
        const div = document.createElement('div');
        div.className = 'label-item';
        div.dataset.idx = idx;
    
        const left = document.createElement('div');
        left.className = 'room-name';
        left.textContent = String(lbl.text || `Room ${idx}`);
    
        const badge = document.createElement('div');
        badge.className = 'badge ' + (lbl._occupied ? 'taken' : 'available');
        badge.textContent = lbl._occupied ? 'Taken' : 'Available';
    
        div.appendChild(left);
        div.appendChild(badge);
    
        div.addEventListener('click', () => {
          const id = Number(div.dataset.idx);
          if (singleModeCheckbox.checked) {
            if (activeSet.has(id)) activeSet.delete(id);
            else { activeSet.clear(); activeSet.add(id); }
          } else {
            if (activeSet.has(id)) activeSet.delete(id);
            else activeSet.add(id);
          }
    
          document.querySelectorAll('.label-item').forEach(el => {
            el.classList.toggle('active', activeSet.has(Number(el.dataset.idx)));
          });
    
          drawBase();
          for (const id of Array.from(activeSet).sort((a,b)=>a-b)){
            const L = labels[id];
            if (!L || !L._coloredCanvas) continue;
            ctx.drawImage(L._coloredCanvas, 0, 0);
          }
        });
    
        return div;
      }
    
      // populate list
      labelList.innerHTML = '';
      labels.forEach((lbl,i) => {
        const el = makeLabelElement(lbl,i);
        labelList.appendChild(el);
      });
    
      // Clear button
      if (clearBtn) clearBtn.addEventListener('click', () => {
        activeSet.clear();
        drawBase();
        document.querySelectorAll('.label-item').forEach(el => el.classList.remove('active'));
      });
    
      console.info('Viewer initialized. If masks or base image are missing check DevTools Network tab for 404s and verify paths:');
      console.info('  labels.json:', manifestUrl);
      console.info('  base image resolved to:', baseImageUrl);
      console.info('  masks base:', masksBase);
    
    })();
    </script>    
</body>
</html>
